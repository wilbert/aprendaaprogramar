name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail

            export APP_DIR="${{ secrets.APP_DIR }}"
            APP_DIR="${APP_DIR:-/var/www/aprendaaprogramar}"

            export GIT_REMOTE="git@github-aprendaaprogramar:wilbert/aprendaaprogramar.git"

            echo "==> Entering app directory: ${APP_DIR}"
            cd "${APP_DIR}"

            echo "==> Configuring Git remote to use the app-specific SSH deploy key"
            git remote set-url origin "${GIT_REMOTE}"

            echo "==> Validating repository access"
            git ls-remote origin main >/dev/null

            echo "==> Running deploy script"
            bash scripts/deploy.sh